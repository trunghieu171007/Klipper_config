[include klicky-probe.cfg]
[include ebb36.cfg]
[include macros.cfg]
[mcu]
canbus_uuid: 8886de3daa10
### To query USB firmware id: ls /dev/serial/by-id/
### Replace /dev/serial/by-id/usb-Klipper_stm32f072xb_************************ with the queried id
#canbus_uuid: e51d5c71a901
### To query CAN firmware id: ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
### For CAN id, replace serial with canbus_uuid: and add the id

#####################################################################
#                            Printer and Acceleration               #
#####################################################################
[printer]                       # Printer settings
kinematics: corexy              # Kinematics: cartesian or corexy, etc. Cartesian: cartesian
max_velocity: 600               # Max printer speed
max_accel: 3000                 # Max acceleration, max 3000
max_z_velocity: 15              # Max Z speed
max_z_accel: 100                # Max Z acceleration
square_corner_velocity: 5.0     # Square corner velocity, lower can help avoid inertia from heavy bed

#####################################################################
#                             Temperature Monitoring                #
#####################################################################
[temperature_sensor Fly-D5]       # FLY board temperature
sensor_type: temperature_mcu      # Associated MCU (default)
#####################################################################
[temperature_sensor FLY-π]        # Host temperature
sensor_type: temperature_host     # Associated host

#####################################################################
#                              Bed Mesh Calibration
#####################################################################
[bed_mesh]
speed: 250                    # Calibration speed
horizontal_move_z: 10       # Z lift before moving to next point
mesh_min: 33,35              # Min calibration point x, y
mesh_max: 281.5, 282           # Max calibration point x, y
probe_count: 7,7             # Sample points (4x4 = 16 points)
mesh_pps: 2,2                # Additional sample points
algorithm: bicubic           # Algorithm model
bicubic_tension: 0.2         # Do not change

#####################################################################
#             X/Y Stepper Settings                                  #
#####################################################################
#                       B__________A
#                            Z0
#
#                          12864

#####################################################################
#                  X Stepper Motor      (Motor B)                   #
#####################################################################
## DRIVER0 motor position
#####################################################################
#           X Stepper Motor (Đã lấy chân của Y cũ đắp sang)         #
#####################################################################
[stepper_x]
step_pin: PC15          # <--- Đổi từ PA1 thành PC15
dir_pin: !PC14           # <--- Đổi từ !PA0 thành PC14 (Tạm thời bỏ dấu !)
enable_pin: !PC2        # <--- Đổi từ !PA2 thành !PC2
rotation_distance: 40
microsteps: 128
full_steps_per_rotation: 200
endstop_pin: ^ebb:PB3       # Giữ nguyên Endstop X (PB4)
position_min: 0
position_endstop: 0     # Giả định Endstop ở góc 0
position_max: 300
homing_speed: 50        # Giảm xuống 50 để test cho an toàn
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC13          # <--- Đổi từ PC3 thành PC13
interpolate: False
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#           Y Stepper Motor (Đã lấy chân của X cũ đắp sang)         #
#####################################################################
[stepper_y]
step_pin: PA1           # <--- Đổi từ PC15 thành PA1
dir_pin: !PA0            # <--- Đổi từ !PC14 thành PA0 (Tạm thời bỏ dấu !)
enable_pin: !PA2        # <--- Đổi từ !PC2 thành !PA2
rotation_distance: 40
microsteps: 128
full_steps_per_rotation: 200
endstop_pin: ^PB4       # Giữ nguyên Endstop Y (PB3)
position_min: 0
position_endstop: 0     # Giả định Endstop ở góc 0
position_max: 300
homing_speed: 50        # Giảm xuống 50 để test cho an toàn
homing_retract_dist: 5

[tmc2209 stepper_y]
uart_pin: PC3           # <--- Đổi từ PC13 thành PC3
interpolate: False
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0
#####################################################################
#[tmc5160 stepper_y]
#cs_pin: PC3
#spi_bus: spi2                       # SPI bus
#run_current: 1.0                    # Motor run current
#interpolate: False                  # 256 microstep interpolation (True/False)
#sense_resistor: 0.075               # Do not change (0.033 for 5160 Pro)
#stealthchop_threshold: 0

#####################################################################
#                     Z Stepper Motor (Z Stepper Settings)          #
#####################################################################
## DRIVER2 motor position
#####################################################################
#                       Z Stepper Config
#####################################################################

[stepper_z]
step_pin: PA5
dir_pin: PA4
enable_pin: !PA6
rotation_distance: 8
microsteps: 16
full_steps_per_rotation: 200

# --- CẤU HÌNH ENDSTOP ---
# endstop_pin: ^PD2              # <--- Đã xóa dòng này
# position_endstop: -0.5         # <--- Đã xóa dòng này (BẮT BUỘC KHI DÙNG VIRTUAL)
endstop_pin: probe:z_virtual_endstop

# --- GIỚI HẠN & TỐC ĐỘ ---
position_max: 290
position_min: -15                 # Cho phép đi xuống âm để bù trừ Z-offset
homing_speed: 10
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PA3
interpolate: false
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#                       Z1 Stepper Config (Motor thứ 2)
#####################################################################

[stepper_z1]
step_pin: PC5
dir_pin: !PC4        # <--- CHÚ Ý: Kiểm tra chiều quay xem có ngược với Z không
enable_pin: !PB0
rotation_distance: 8
microsteps: 16      # Phải khớp với stepper_z
full_steps_per_rotation: 200

[tmc2209 stepper_z1]
uart_pin: PA7
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0
[heater_bed]
heater_pin: PC7              # Bed heater pin
sensor_type: Generic 3950    # Bed sensor type
sensor_pin: PC0              # Bed sensor pin
max_power: 1.0               # Bed power
min_temp: -235               # Min bed temp
max_temp: 120                # Max bed temp
# Bed PID tune: "PID_CALIBRATE HEATER=heater_bed TARGET=100"
control: pid
pid_kp: 58.437
pid_ki: 2.347
pid_kd: 363.769
#####################################################################
#                             Fan Config
#####################################################################
#####################################################################
# [heater_fan Throat Cooling]   # Throat cooling fan
# pin:PC8
# max_power: 1.0
# kick_start_time: 0.5         # Startup time (do not change)
# heater: extruder             # Associated device: extruder
# heater_temp: 50              # Fan turns on when extruder reaches this temp
# fan_speed: 1.0

#####################################################################
#                           Idle Bed Shutdown                       #
#####################################################################
# [preheat PLA]
# extruder = 210
# heater_bed = 60

# [preheat PETG]
# extruder = 245
# heater_bed = 0

[idle_timeout]
timeout: 1800                # Turn off bed after 30 min idle

#####################################################################
#                           Bed Leveling Probe                      #
#####################################################################
# Default PL08N probe should not be lower than nozzle, only for leveling. If your PL08N is NO (normally open), add ! to pin.
# [probe]
# pin: ^PB5                   # Endstop pin, normally closed recommended, add ! to reverse, io-2 position
# x_offset: 0                  # X offset from nozzle
# y_offset: 25.0               # Y offset from nozzle
# z_offset: 0                  # Z offset from nozzle
# speed: 10.0                  # Probing speed
# samples: 3                   # Number of samples
# samples_result: median       # Value method (default median)
# sample_retract_dist: 4.0     # Probe retract distance
# samples_tolerance: 0.007     # Sample tolerance (too small may increase samples)
# samples_tolerance_retries: 3 # Retries for out-of-tolerance
# #####################################################################
# #[bltouch]
# #sensor_pin: ^PB5             # Signal pin
# #control_pin: PA8             # Servo control
# #x_offset: 0                  # X offset from nozzle
# #y_offset: 25.0               # Y offset from nozzle
# #z_offset: 0                  # Z offset from nozzle

# #####################################################################
# #                               Homing                              #
# #####################################################################
# [safe_z_home]                # Z endstop coordinates
# home_xy_position: 140.75, 141    # Z endstop position (IMPORTANT! Adjust as needed)
# speed:100                    # Homing speed
# z_hop:10    

# Z lift before homing
# #####################################################################
# # [homing_override]
# # axes: z
# # set_position_z: 0
# # gcode:
# #   G90
# #   G0 Z15 F600
# #   G28 X Y
# #    ## Z endstop XY position
# #    ## After, update X0 and Y0 to your values (e.g. X157, Y305)
# #    ## Z endstop position
# #   G0 X185 Y250 F3600    #250mm
# #   G28 Z
# #   G0 Z10 F1800

# #####################################################################
#                          12864 Display Config (enable if needed)
#####################################################################
[board_pins]
aliases:
    EXP1_1=NC,   EXP1_3=PC11,  EXP1_5=PC10, EXP1_7=NC, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=PA14,  EXP1_6=PA13, EXP1_8=NC, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PB14, EXP2_3=PC12, EXP2_5=PB6,   EXP2_7=NC,    EXP2_9=<GND>,
    EXP2_2=PB13, EXP2_4=PB12, EXP2_6=PB15,  EXP2_8=<RST>, EXP2_10=<NC>,
#####################################################################
[display]
lcd_type: uc1701                # Display driver type
cs_pin: EXP1_3                  # Display CS pin
a0_pin: EXP1_4                  # Display A0 pin
rst_pin: EXP1_5                 # Display reset pin
contrast: 63                    # Contrast
encoder_pins: ^EXP2_5, ^!EXP2_3 # Encoder pins
click_pin: ^!EXP1_2             # Encoder button pin
####################################################################
#### For FLY Mini12864
[neopixel fly_mini12864]
pin: EXP1_6                     # Display backlight pin
chain_count: 3
initial_RED: 0.5                # Red LED brightness (0-1)
initial_GREEN: 0.5              # Green LED brightness (0-1)
initial_BLUE: 0.5               # Blue LED brightness (0-1)
color_order: RGB                # Color order

#####################################################################
#                           Custom gcode Macros                     #
#####################################################################
[gcode_macro PRINT_START]
gcode:
    # --- 1. LẤY NHIỆT ĐỘ TỪ SLICER ---
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}

    # --- 2. GIA NHIỆT BÀN TRƯỚC ---
    M117 Dang nung ban in...
    M140 S{BED_TEMP}      ; Đặt nhiệt bàn
#    M190 S{BED_TEMP}      ; Bắt buộc đợi bàn nóng ổn định (để khung giãn nở)

    # --- 3. HOMING & Z-TILT (Khi đầu in chưa quá nóng) ---
    M117 Dang Home va Can bang...
    G28                   ; Home All
    Z_TILT_ADJUST         ; Cân bằng 2 trục Z
    G28 Z                 ; Home lại Z lần cuối
    # 4. LOAD MESH (Thay vì đo lại) -> Tiết kiệm được 3-5 phút ở đây!
    BED_MESH_PROFILE LOAD=24.1
    #BED_MESH_CALIBRATE

    # --- 4. GIA NHIỆT ĐẦU IN (ĐÃ SỬA ĐỔI) ---
    M117 Dang nung dau in...
    
    # Đặt nhiệt độ mục tiêu và KHÔNG ĐỢI (để máy chạy lệnh tiếp theo ngay)
    M104 S{EXTRUDER_TEMP} 
    
    # Di chuyển đầu in ra góc chờ (tránh chảy nhựa ra giữa bàn)
    G1 X0 Y0 Z10 F5000    

    # --- QUAN TRỌNG: Thay thế M109 bằng lệnh này ---
    # Chỉ cần nhiệt độ chạm mốc MINIMUM là cho in luôn.
    # Không quan tâm sau đó nó có dao động 1-2 độ hay không.
    M117 Doi nhiet do cham moc...
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP}

    #M117 doi 5s
    #G4 P5000

    # --- 5. BẮT ĐẦU IN ---
    M117 Dang in duong moi (Purge Line)...
    
    G92 E0                      ; Reset bộ đùn về 0 (Rất quan trọng!)
    G1 Z2.0 F3000               ; Nâng Z lên một chút để tránh cào bàn
    
    # Di chuyển đến điểm bắt đầu (Góc trái dưới)
    G1 X2.1 Y20 Z0.28 F5000.0   
    
    # In đường thứ nhất (Chạy dọc trục Y 180mm)
    G1 X2.1 Y200.0 Z0.28 F1500.0 E15 
    
    # Dịch sang phải một chút
    G1 X2.4 Y200.0 Z0.28 F5000.0 
    
    # In đường thứ hai (Chạy ngược về)
    G1 X2.4 Y20 Z0.28 F1500.0 E30 
    
    # Reset bộ đùn lần nữa để tính toán in bắt đầu từ 0
    G92 E0 
    
    # Nhấc kim và rút nhựa nhẹ để tránh dây mực (Retract & Z-Hop)
    G1 Z2.0 F3000 
    G1 E-0.5 F3600
    # (Có thể thêm code in đường Prime Line ở đây nếu muốn)
    M117 Bat dau in!

#####################################################################
[gcode_macro PRINT_HUAXIAN]        # Macro after PRINT_START, customize pre-print actions
gcode:
    G1 Z5 F3000
    G92 E0;              # Reset extruder
    G90                  # Set absolute coordinates
    G0 X5 Y1 F6000       # Move to x5 y1 at 100mm/s (F6000 = 6000mm/min)
    G0 Z0.4              # Move Z to 0.4
    G91                  # Set relative coordinates
    G1 X100 E20 F1200;   # Move X 100mm and extrude, change F to adjust rate
    G1 Y1                # Move Y 1mm
    G1 X-100 E20 F1200;  # Move X -100mm and extrude, change F to adjust rate
    G0 z5                # Raise Z 5mm
    G1 E-5.0 F3600       # Retract filament
    G92 E0;              # Reset extruder
    G90                  # Set absolute coordinates

#####################################################################
[gcode_macro PRINT_END]
gcode:
    # --- 1. ỔN ĐỊNH VÀ RÚT NHỰA ---
    M400                           ; Chờ hoàn thành mọi chuyển động
    G92 E0                         ; Reset extruder về 0
    G1 E-5.0 F3600                 ; Rút nhựa lại 5mm (Retract)
    
    # --- 2. DI CHUYỂN AN TOÀN (Tương đối) ---
    G91                            ; Chuyển sang chế độ Tương đối
    G0 Z10.0 F3000                 ; Nâng trục Z lên 10mm để tránh va chạm
    
    # --- 3. VỀ HOME X0 Y0 (Tuyệt đối) ---
    G90                            ; Chuyển về chế độ Tuyệt đối
    
    # --- DÒNG ĐÃ SỬA ---
    G0 X0 Y0 F3600                 ; Di chuyển đầu in về góc 0,0 (thường là góc trước-trái)
    # -------------------
    
    # --- 4. TẮT MÁY ---
    M106 S0                        ; Tắt quạt
    M104 S0                        ; Tắt nhiệt độ đầu in
    M140 S0                        ; Tắt nhiệt độ bàn
    
    M84                            ; Tắt động cơ
[force_move]
enable_force_move: True

# [homing_override]
# gcode:
#     G90
#     G0 X100 Y100 Z10 F3000  # Di chuyển an toàn
#     SET_KINEMATIC_POSITION X=0 Y=0 Z=0  # Set vị trí gốc
#     G92 X0 Y0 Z0
# set_position_z: 0.0
# axes: xyz



# vẽ vòng tròn
[gcode_arcs]
resolution: 1.0

[virtual_sdcard]
# Đường dẫn này thường là chuẩn trên Armbian/Pi cài bằng KIAUH.
# Nếu báo lỗi đường dẫn, hãy thử đổi thành: ~/gcode_files
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

#####################################################################
#           HOMING THÔNG MINH (CHO MÁY CHƯA CÓ Z SENSOR)            #
#####################################################################
# [homing_override]
# axes: z
# set_position_z: 0
# gcode:
#    G90
#    G0 Z5 F600 ; Nâng Z lên 5mm để tránh cày bàn

#    # Đoạn này xử lý Logic:
#    # Nếu bạn gõ G28 Z -> Nó sẽ Fake Home Z (Vì chưa có sensor)
#    # Nếu bạn gõ G28 hoặc G28 X Y -> Nó sẽ Home X Y thật, sau đó Fake Z.

#    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

#    {% if home_all or 'X' in params %}
#       G28 X   ; Chạy về công tắc X
#    {% endif %}

#    {% if home_all or 'Y' in params %}
#       G28 Y   ; Chạy về công tắc Y
#    {% endif %}

#    {% if home_all or 'Z' in params %}
#       # VÌ CHƯA CÓ Z ENDSTOP, TA SẼ KHÔNG G28 Z MÀ SẼ SET TỌA ĐỘ ẢO
#       SET_KINEMATIC_POSITION Z=0
#       G1 Z10 F600 ; Nâng lên 10mm sau khi Home xong
#    {% endif %}
[z_tilt]
# 1. Toạ độ THỰC TẾ của 2 trục vít me (Pivot Points)
z_positions:
    310.75, 146   # <--- Dòng 1: Phải là toạ độ bên PHẢI (Tương ứng stepper_z)
    -85, 148      # <--- Dòng 2: Phải là toạ độ bên TRÁI (Tương ứng stepper_z1)
    
points:
    # Điểm đo trên bàn in (Nên đảo lại thứ tự cho khớp với z_positions để tối ưu)
    260.75, 146   # <--- Đo điểm bên Phải trước
    0, 148        # <--- Đo điểm bên Trái sau

speed: 200              
horizontal_move_z: 15   
retries: 10             
retry_tolerance: 0.04

#####################################################################
#   Bed Leveling (Screws Tilt Adjust)
#####################################################################

[screws_tilt_adjust]
# Ốc 1: Trước - Trái (Làm chuẩn - Base)
screw1: 0, 27           
screw1_name: front left screw

# Ốc 2: Trước - Phải
screw2: 239, 27         
screw2_name: front right screw

# Ốc 3: Sau - Phải
screw3: 239, 267          
screw3_name: rear right screw

# Ốc 4: Sau - Trái
screw4: 0, 267           
screw4_name: rear left screw

speed: 150                # Tốc độ di chuyển đầu in
horizontal_move_z: 10     # Nhấc cao đầu in 10mm khi di chuyển để tránh va chạm
screw_thread: CW-M3       # Voron dùng ốc M3, vặn cùng chiều kim đồng hồ (CW) để siết xuống

