[gcode_macro LOAD_FILAMENT]
variable_load_distance:  50
variable_purge_distance:  25
variable_fast_speed: 1500    # Tốc độ kéo nhanh (F1500 tương đương 25mm/s)
gcode:
    {% set speed = params.SPEED|default(300) %}
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0
    G1 E{load_distance} F{fast_speed} # Kéo nhanh êm ái
    G1 E{purge_distance} F{speed}     # Đùn chậm (purge)
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  50
variable_purge_distance:  25
variable_fast_speed: 1500    # Tốc độ rút nhanh
gcode:
    {% set speed = params.SPEED|default(300) %}
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0
    G1 E{purge_distance} F{speed}       # Đùn nhe vào để làm lỏng nhựa
    G1 E-{unload_distance} F{fast_speed} # Rút nhanh ra khỏi bánh răng
    RESTORE_GCODE_STATE NAME=unload_state